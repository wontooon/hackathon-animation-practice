<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <h1>Animation Practice</h1>
    <p class="subtitle">哈哈哈哈哈</p>

    <button class="btn" id="revealBtn">显示选项</button>
    <p class="hint" id="hint"></p>

    <section class="cards" id="cards">
      <article class="card">
        <h2>克劳德·莫奈</h2>
        <p>法国印象派创始人之一，以《睡莲》《日出·印象》闻名，痴迷于捕捉光与色彩的瞬间变化。</p>
      </article>
      <article class="card">
        <h2>文森特·梵高</h2>
        <p>荷兰后印象派画家，笔触奔放、色彩浓烈，代表作有《星月夜》《向日葵》。</p>
      </article>
      <article class="card">
        <h2>皮埃尔-奥古斯特·雷诺阿</h2>
        <p>法国印象派画家，擅长描绘人物与生活场景中柔和明亮的光影，如《煎饼磨坊的舞会》。</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
